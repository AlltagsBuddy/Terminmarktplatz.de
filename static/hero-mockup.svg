<svg viewBox="0 0 460 340" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Terminmarktplatz Dashboard-Vorschau: Slot-Verwaltung mit Statusübersicht">
  <title>Terminmarktplatz — Dashboard Vorschau</title>
  <defs>
    <linearGradient id="hm-bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#0b0f1a"/>
    </linearGradient>
    <linearGradient id="hm-brand-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff6bcb"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="hm-btn-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="hm-card-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.08)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.03)"/>
    </linearGradient>
    <linearGradient id="hm-stat1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff6bcb"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="hm-stat2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="hm-stat3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <filter id="hm-glow-pink">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="hm-glow-cyan">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="hm-round-clip">
      <rect width="460" height="340" rx="18"/>
    </clipPath>
  </defs>

  <!-- Outer frame -->
  <rect width="460" height="340" rx="18" fill="url(#hm-bg-grad)"/>
  <rect width="460" height="340" rx="18" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>

  <!-- Ambient glow blobs -->
  <ellipse cx="60" cy="40" rx="120" ry="80" fill="rgba(255,107,203,0.12)" filter="url(#hm-glow-pink)"/>
  <ellipse cx="400" cy="300" rx="100" ry="70" fill="rgba(6,182,212,0.10)" filter="url(#hm-glow-cyan)"/>

  <!-- Top bar -->
  <rect x="0" y="0" width="460" height="44" rx="18" fill="rgba(255,255,255,0.04)"/>
  <rect x="0" y="28" width="460" height="16" fill="rgba(255,255,255,0.04)"/>
  <rect x="0" y="43" width="460" height="1" fill="rgba(255,255,255,0.10)"/>

  <!-- Brand dot -->
  <rect x="16" y="13" width="18" height="18" rx="6" fill="url(#hm-brand-grad)"/>
  <!-- Brand text -->
  <text x="40" y="26" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="#f8fafc">Terminmarktplatz</text>
  <!-- Nav items -->
  <text x="196" y="26" font-family="Inter, Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.5)">Meine Slots</text>
  <text x="262" y="26" font-family="Inter, Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.5)">Profil</text>
  <text x="296" y="26" font-family="Inter, Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.5)">Bewertungen</text>
  <!-- Avatar circle -->
  <circle cx="440" cy="22" r="10" fill="url(#hm-btn-grad)"/>
  <text x="440" y="26" font-family="Inter, Arial, sans-serif" font-size="9" font-weight="700" fill="#0b0f1a" text-anchor="middle">AB</text>

  <!-- Page title -->
  <text x="20" y="68" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" fill="#f8fafc">Meine Slots</text>
  <!-- Gradient underline after h2 (mimics CSS h2::after) -->
  <rect x="100" y="62" width="44" height="5" rx="3" fill="url(#hm-brand-grad)"/>

  <!-- + Slot button -->
  <rect x="360" y="54" width="82" height="26" rx="12" fill="url(#hm-btn-grad)"/>
  <text x="401" y="72" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="800" fill="#0b0f1a" text-anchor="middle">+ Neuer Slot</text>

  <!-- Stat cards row -->
  <!-- Card 1 -->
  <rect x="20" y="84" width="126" height="52" rx="12" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.10)" stroke-width="0.5"/>
  <text x="30" y="102" font-family="Inter, Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.5)">Aktive Slots</text>
  <text x="30" y="122" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="900" fill="url(#hm-stat1)">7</text>

  <!-- Card 2 -->
  <rect x="158" y="84" width="126" height="52" rx="12" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.10)" stroke-width="0.5"/>
  <text x="168" y="102" font-family="Inter, Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.5)">Buchungen heute</text>
  <text x="168" y="122" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="900" fill="url(#hm-stat2)">3</text>

  <!-- Card 3 -->
  <rect x="296" y="84" width="146" height="52" rx="12" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.10)" stroke-width="0.5"/>
  <text x="306" y="102" font-family="Inter, Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.5)">Umsatz gerettet</text>
  <text x="306" y="122" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="900" fill="url(#hm-stat3)">420 €</text>

  <!-- Table header -->
  <rect x="20" y="148" width="422" height="24" rx="6" fill="rgba(255,255,255,0.05)"/>
  <text x="32" y="164" font-family="Inter, Arial, sans-serif" font-size="9" font-weight="700" fill="rgba(255,255,255,0.45)">DATUM & UHRZEIT</text>
  <text x="170" y="164" font-family="Inter, Arial, sans-serif" font-size="9" font-weight="700" fill="rgba(255,255,255,0.45)">LEISTUNG</text>
  <text x="290" y="164" font-family="Inter, Arial, sans-serif" font-size="9" font-weight="700" fill="rgba(255,255,255,0.45)">ORT</text>
  <text x="370" y="164" font-family="Inter, Arial, sans-serif" font-size="9" font-weight="700" fill="rgba(255,255,255,0.45)">STATUS</text>

  <!-- Row 1 — booked (green) -->
  <rect x="20" y="172" width="422" height="34" rx="6" fill="rgba(16,185,129,0.08)" stroke="rgba(16,185,129,0.15)" stroke-width="0.5"/>
  <text x="32" y="186" font-family="Inter, Arial, sans-serif" font-size="9.5" fill="#f8fafc">Mo, 23.04. · 10:00</text>
  <text x="32" y="198" font-family="Inter, Arial, sans-serif" font-size="8.5" fill="rgba(255,255,255,0.4)">60 Min.</text>
  <text x="170" y="192" font-family="Inter, Arial, sans-serif" font-size="9.5" fill="#f8fafc">Waschen &amp; Schneiden</text>
  <text x="290" y="192" font-family="Inter, Arial, sans-serif" font-size="9.5" fill="rgba(255,255,255,0.6)">München-Mitte</text>
  <rect x="368" y="178" width="52" height="18" rx="9" fill="rgba(16,185,129,0.2)" stroke="rgba(16,185,129,0.4)" stroke-width="0.5"/>
  <text x="394" y="191" font-family="Inter, Arial, sans-serif" font-size="8.5" font-weight="700" fill="#10b981" text-anchor="middle">Gebucht</text>

  <!-- Row 2 — free (cyan) -->
  <rect x="20" y="210" width="422" height="34" rx="6" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.07)" stroke-width="0.5"/>
  <text x="32" y="224" font-family="Inter, Arial, sans-serif" font-size="9.5" fill="#f8fafc">Mo, 23.04. · 14:30</text>
  <text x="32" y="236" font-family="Inter, Arial, sans-serif" font-size="8.5" fill="rgba(255,255,255,0.4)">45 Min.</text>
  <text x="170" y="230" font-family="Inter, Arial, sans-serif" font-size="9.5" fill="#f8fafc">Farbe &amp; Tönung</text>
  <text x="290" y="230" font-family="Inter, Arial, sans-serif" font-size="9.5" fill="rgba(255,255,255,0.6)">München-Mitte</text>
  <rect x="368" y="216" width="46" height="18" rx="9" fill="rgba(6,182,212,0.15)" stroke="rgba(6,182,212,0.35)" stroke-width="0.5"/>
  <text x="391" y="229" font-family="Inter, Arial, sans-serif" font-size="8.5" font-weight="700" fill="#06b6d4" text-anchor="middle">Frei</text>

  <!-- Row 3 — new / just published (pink highlight) -->
  <rect x="20" y="248" width="422" height="34" rx="6" fill="rgba(255,107,203,0.07)" stroke="rgba(255,107,203,0.2)" stroke-width="0.5"/>
  <!-- Pulsing dot indicator (static) -->
  <circle cx="27" cy="265" r="4" fill="#ff6bcb" opacity="0.9"/>
  <circle cx="27" cy="265" r="7" fill="rgba(255,107,203,0.25)"/>
  <text x="38" y="262" font-family="Inter, Arial, sans-serif" font-size="9.5" fill="#f8fafc">Di, 24.04. · 09:00</text>
  <text x="38" y="274" font-family="Inter, Arial, sans-serif" font-size="8.5" fill="rgba(255,255,255,0.4)">Gerade veröffentlicht</text>
  <text x="170" y="268" font-family="Inter, Arial, sans-serif" font-size="9.5" fill="#f8fafc">Herrenschnitt</text>
  <text x="290" y="268" font-family="Inter, Arial, sans-serif" font-size="9.5" fill="rgba(255,255,255,0.6)">München-Mitte</text>
  <rect x="362" y="254" width="66" height="18" rx="9" fill="rgba(255,107,203,0.15)" stroke="rgba(255,107,203,0.35)" stroke-width="0.5"/>
  <text x="395" y="267" font-family="Inter, Arial, sans-serif" font-size="8.5" font-weight="700" fill="#ff6bcb" text-anchor="middle">Neu online</text>

  <!-- Row 4 — past/gray -->
  <rect x="20" y="286" width="422" height="34" rx="6" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.05)" stroke-width="0.5"/>
  <text x="32" y="300" font-family="Inter, Arial, sans-serif" font-size="9.5" fill="rgba(255,255,255,0.35)">So, 21.04. · 11:00</text>
  <text x="32" y="312" font-family="Inter, Arial, sans-serif" font-size="8.5" fill="rgba(255,255,255,0.2)">60 Min.</text>
  <text x="170" y="306" font-family="Inter, Arial, sans-serif" font-size="9.5" fill="rgba(255,255,255,0.35)">Waschen &amp; Föhnen</text>
  <text x="290" y="306" font-family="Inter, Arial, sans-serif" font-size="9.5" fill="rgba(255,255,255,0.25)">München-Mitte</text>
  <rect x="362" y="292" width="66" height="18" rx="9" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.10)" stroke-width="0.5"/>
  <text x="395" y="305" font-family="Inter, Arial, sans-serif" font-size="8.5" font-weight="700" fill="rgba(255,255,255,0.3)" text-anchor="middle">Abgelaufen</text>

</svg>
